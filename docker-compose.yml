services:
  neo4j:
    image: neo4j:5.26-community
    container_name: sciknot-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/sciknot-pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - ./neo4j_data:/data
